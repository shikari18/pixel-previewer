<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're Offline — The Flow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #111111;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 360px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Animated wifi-off icon */
    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
      50% { box-shadow: 0 0 0 16px rgba(99,102,241,0.08); }
    }

    .icon-wrap svg {
      opacity: 0.5;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      color: #111111;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      text-decoration: none;
    }

    .btn:hover { transform: scale(1.03); }
    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 2rem auto;
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <!-- wifi-off SVG -->
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="white" stroke="none"/>
      </svg>
    </div>

    <p class="label">No connection</p>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.<br/>The Flow needs to be online to work.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/>
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
        <path d="M3 22v-6h6"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      Try again
    </button>

    <div class="divider"></div>
    <p class="hint">The Flow · Stay in your zone</p>
  </div>
</body>
</html>
